events {
    worker_connections 1024;
}

http {
    # This block tells Nginx how to handle web traffic
    server {
        listen 80; # Nginx listens on port 80 (standard HTTP)
        server_name mymehendi.publicvm.com; # Replace with your IP or domain later

        location / {
            # This is the "Reverse Proxy" part
            # 'server' is the name of your service in the docker-compose.yml
            proxy_pass http://server:5000;
            
            # These headers ensure your app knows the original user's IP
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}